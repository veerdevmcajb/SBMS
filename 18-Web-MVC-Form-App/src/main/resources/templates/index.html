<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
	
	<div class="container mt-5">
		<div class="col-md-6">
		
		<h1>User Form</h1>
		
		<form th:action="@{/saveUser}" th:object="${user}" method="post">
			
			<div class="mb-3">
				<label class="form-lable">UserName</label>
				<input type="text" th:field="*{name}" class="form-control" placeholder="Enter UserName" required>
			</div>
			
			<div class="mb-3">
				<label class="form-lable">Email</label>
				<input type="text" th:field="*{email}" class="form-control" placeholder="Enter Email" required>
			</div>
					
			<div class="mb-3">
				<label class="form-lable">PhoneNo</label>
				<input type="text" th:field="*{phono}" class="form-control" placeholder="Enter Phono" required>
			</div>
			

			<div class="d-grid">
				<button type="submit" class="btn btn-primary">Submit</button>
			</div>
			
		</form>
			
	</div>
	</div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
